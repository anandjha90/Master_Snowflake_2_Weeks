    base_table:
      database: GL_SLS_PROD_ENR_DB
      schema: AI_FEATURE_DATASET
      table: AI_ACCOUNT_SUMMARY_S0_USER_ST_ASSIGNMENT_DTL
    dimensions:
      - name: ACCOUNT_NAME
        synonyms:
          - account_identifier
          - account_label
          - account_title
          - business_name
          - client_name
          - company_name
          - customer_name
          - emdm_party_name
          - entity_name
          - firm_name
          - organization_name
          - party_name
        description: The name of the account associated with the record. User sometimes could refer as party name.
        expr: ACCOUNT_NAME
        data_type: VARCHAR(255)
        sample_values:
          - Stichting Star-Medisch Diagnostisch Centrum (Star-MDC)
          - Key Equipment Finance
          - Northern Arizona University
      - name: ASSIGNED_SALES_TERRITORY_TYPE
        synonyms:
          - assigned_territory_classification
