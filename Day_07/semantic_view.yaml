        MIN(ib.supportenddate) AS min_support_end_date,
        MAX(ib.supportenddate) AS max_support_end_date,
        COUNT(ib.supportenddate) AS support_end_date_count,
        AVG(ib.ib_refresh_potential) AS avg_ib_refresh_potential
      FROM
        ai_ib_details AS ib
        LEFT OUTER JOIN ai_account_summary_s0_user_st_assignment_dtl AS ust ON ib.customerid = ust.emdm_party_id_c
      WHERE
        ib.businessunit = 'Cloud & AI Solutions'
        AND ust.useremail_c = 'melissa.montes@hpe.com'
      GROUP BY
        ust.display_account_country_st_id
      ORDER BY
        total_ib_refresh_potential DESC NULLS LAST
