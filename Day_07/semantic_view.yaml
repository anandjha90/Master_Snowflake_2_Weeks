  - name: '"For user martin.kayser@hpe.com in Germany - PRF territory, show the top 5 accounts by total IB_REFRESH_POTENTIAL_GLOBAL from AI_IB_DETAILS, showing ACCOUNT_NAME and total refresh potential, ordered descending"'
    sql: |-
      WITH user_accounts AS (
        SELECT
          s0.account_name,
          s0.emdm_party_id_c
        FROM
          ai_account_summary_s0_user_st_assignment_dtl AS s0
        WHERE
          s0.useremail_c = 'martin.kayser@hpe.com'
          AND UPPER(s0.originally_assigned_sales_territory_name) LIKE '%GERMANY%'
      ),
      ib_agg AS (
        SELECT
          ua.account_name,
          SUM(ib.ib_refresh_potential_global) AS total_ib_refresh_potential_global,
          COUNT(DISTINCT ib.serialnumber) AS distinct_asset_count,
          AVG(ib.ib_refresh_potential_global) AS avg_ib_refresh_potential_global
        FROM
          ai_ib_details AS ib
          LEFT OUTER JOIN ai_account_summary_s0_user_st_assignment_dtl AS s0 ON ib.customerid = s0.emdm_party_id_c
          INNER JOIN user_accounts AS ua ON s0.emdm_party_id_c = ua.emdm_party_id_c
        WHERE
          ib.finalshipdate <= CURRENT_TIMESTAMP()
        GROUP BY
          ua.account_name
      )
      SELECT
        account_name,
        total_ib_refresh_potential_global,
        distinct_asset_count,
        avg_ib_refresh_potential_global
      FROM
        ib_agg
      ORDER BY
        total_ib_refresh_potential_global DESC NULLS LAST
