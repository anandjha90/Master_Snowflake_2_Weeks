  - name: AI_IB_PROGRAM_SUMMARY
    description: The table contains records of campaign programs with AI-generated summaries. Each record corresponds to a specific campaign and includes identifying details, descriptive summaries of varying lengths, and timestamps indicating when records were created or last updated.
