  - name: AI_ACCOUNT_SUMMARY_S10_MKT_INTERNAL_WEB_SEARCH_ST_CE_COMBINED
    synonyms:
      - Account Category Score Summary
      - Account Intelligence Summary
      - AI Account Summary
      - AI Driven Account Insights
      - Country Based Account Summary
      - Internal Web Search Summary
      - Market Search Account Data
      - Marketing Internal Web Search
      - State Country Combined
      - Web Search Marketing Data
    description: Contains customer web engagement signals derived from customer employee searches on HPE websites, including Sales Territory IDs (customer identifiers), business categories, BU categories, and associated engagement scores.
    base_table:
      database: GL_SLS_PROD_ENR_DB
      schema: AI_FEATURE_DATASET
      table: AI_ACCOUNT_SUMMARY_S10_MKT_INTERNAL_WEB_SEARCH_ST_CE_COMBINED
    dimensions:
      - name: BU_CATEGORY
        description: The business unit category associated with the account.
        expr: BU_CATEGORY
        data_type: VARCHAR(32000)
        sample_values:
          - OBS Improve Customer Experience
          - OBS Reduce Downtime
          - Operational Services
      - name: BU_CATEGORY_SCORE
        description: The categorized score representing the business unit's performance or risk level.
        expr: BU_CATEGORY_SCORE
        data_type: VARCHAR(32000)
        sample_values:
          - Low
          - High
          - Mid
      - name: ST_COUNTRY_ID
        description: Numeric identifier for a country associated with the store.
        expr: ST_COUNTRY_ID
        data_type: NUMBER(38,0)
        sample_values:
          - '59206'
          - '65475'
          - '65650'
    facts:
      - name: SCORE_NUM
        description: A numerical score associated with an account.
        expr: SCORE_NUM
        data_type: NUMBER(36,6)
        access_modifier: public_access
        sample_values:
          - '63.000000'
          - '26.333333'
          - '12.000000'
  - name: AI_ACCOUNT_SUMMARY_S11_MKT_EXTERNAL_WEB_SEARCH_ST_CE_COMBINED
    description: The table contains records associating geographic regions with ranked topics. Each record includes a country identifier, a topic category, and the topic's rank within that region.
    base_table:
      database: GL_SLS_PROD_ENR_DB
      schema: AI_FEATURE_DATASET
      table: AI_ACCOUNT_SUMMARY_S11_MKT_EXTERNAL_WEB_SEARCH_ST_CE_COMBINED
    dimensions:
      - name: ST_COUNTRY_ID
        synonyms:
          - country_code
          - country_id
          - country_identifier
          - territory_id
        description: The unique identifier for a country associated with a store.
        expr: ST_COUNTRY_ID
        data_type: NUMBER(38,0)
        sample_values:
          - '56011'
          - '56050'
          - '56483'
      - name: TOPIC
        synonyms:
          - category
          - keyword
          - search_topic
          - subject
          - theme
          - topic_label
          - topic_name
        description: The topic or subject area associated with an account or activity.
        expr: TOPIC
        data_type: VARCHAR(32000)
        sample_values:
          - ImproveCustomerExperience
          - HybridCloud
          - WLAN
    facts:
      - name: TOPIC_RANK
        synonyms:
          - subject_rank
          - theme_rank
          - topic_order
          - topic_position
          - topic_rating
          - topic_score
        description: The rank assigned to a topic.
        expr: TOPIC_RANK
        data_type: NUMBER(18,0)
        access_modifier: public_access
        sample_values:
          - '2'
          - '1'
          - '4'
  - name: AI_ACCOUNT_SUMMARY_S12_ACTIONABLE_INSIGHT
    description: The table contains records of AI-generated actionable insights associated with accounts. Each record captures a compelling event and a series of paired insight descriptions and corresponding values, suggesting a structured breakdown of multiple insight dimensions per account.
    base_table:
      database: GL_SLS_PROD_ENR_DB
      schema: AI_FEATURE_DATASET
      table: AI_ACCOUNT_SUMMARY_S12_ACTIONABLE_INSIGHT
    dimensions:
      - name: ACTION
        synonyms:
          - action_plan
          - next_steps
          - recommendation
          - task
        description: Recommended next steps for the sales user to take in order to execute on the actionable insight.
        expr: ACTION
        data_type: VARCHAR(16777216)
        sample_values:
          - Review the units with support expiring and position a tech refresh highlighting the benefits of latest technology.
          - Review customer that has CX switches but no Central attached, use the top 5 key benefits to attach HPE Aruba Networking Central to existing CX switch installed base.
          - 'Review the units with support expiring and position a tech refresh highlighting the benefits of latest technology '
      - name: COMPELLING_EVENT
        synonyms:
          - catalyst
          - decision_driver
          - milestone
          - reason_to_call
          - trigger
          - triggering_event
        description: A compelling event or trigger associated with an account that represents a potential sales opportunity or action item.
        expr: COMPELLING_EVENT
        data_type: VARCHAR(16777216)
        sample_values:
          - Attach HPE Aruba Networking Central to installed base of CX switches (Networking)
          - Multi Vendor Services support for Dell account (Compute)
          - Expiring Support on Ageing IB (Networking)
      - name: ENABLEMENT_HYPERLINK
        synonyms:
          - enablement_link
          - enablement_page_url
          - enablement_reference
          - enablement_url
          - enablement_web_address
          - resource_hyperlink
          - resource_url
          - sales_collateral
          - support_link
          - training_hyperlink
        description: Hyperlinks to enablement resources or supporting documentation.
        expr: ENABLEMENT_HYPERLINK
        data_type: VARCHAR(16777216)
        sample_values:
          - https://hpe.sharepoint.com/:b:/r/teams/IB-One/WW%20Programs%20Library/FY25%20Programs/FY25%20One%20Pagers/Actionable%20Insights%20Playbooks/Aruba_%20Expiring%20Support%20insight.pdf
          - https://hpe.seismic.com/Link/Content/DCG2X89b493T3Gc2JDfGQCVQD3p8
          - https://hpe.sharepoint.com/:b:/r/teams/IB-One/WW%20Programs%20Library/FY25%20Programs/FY25%20One%20Pagers/Actionable%20Insights%20Playbooks/Storage_%20Expiring%20Support%20insight.pdf
      - name: ENABLEMENT_LABEL
        synonyms:
          - activation_label
          - activation_tag
          - empowerment_label
          - enablement_descriptor
          - enablement_identifier
          - enablement_name
          - enablement_tag
          - enablement_title
          - support_label
          - support_tag
        description: The label identifying the enablement playbook or resource associated with an actionable insight.
        expr: ENABLEMENT_LABEL
        data_type: VARCHAR(16777216)
        sample_values:
          - Aruba Tech Refresh Playbook
          - Central Winbook
          - Storage Tech Refresh Playbook
      - name: GBU
        synonyms:
          - BU
          - business_division
          - business_group
          - business_unit
          - corporate_division
          - division
          - enterprise_unit
          - GBU_code
          - global_business_unit
          - organizational_unit
        description: The Global Business Unit associated with the actionable insight.
        expr: GBU
        data_type: VARCHAR(16777216)
        sample_values:
          - Networking Solutions
          - Cloud & AI Solutions
      - name: INSIGHT
        synonyms:
          - analysis
          - context
          - customer_context
          - customer_fit
          - customer_rationale
          - deduction
          - intelligence
          - observation
          - perception
          - relevance
          - revelation
          - understanding
        description: Data driven customer centric context for the actionable insight. It contextualizes for the sales user the specific circumstances of this customer that make it a good fit for executing the actionable insight.
        expr: INSIGHT
        data_type: VARCHAR(16777216)
        sample_values:
          - 'This customer has 2 amount units of CX (CX Switching) with No Foundational Support and No HPE Aruba Networking Central. Total HPE Aruba Central attach potential is: $740'
          - 'Thisexisting GreenLakecustomer has  10 ageing units ( Core_Nimble Storage | Core_3PAR Storage ) with support expiring in 180 days where the GBU strategy is to refreshunder an existing GL Contract Agreement (GreenLake first approach) .  Total refresh potential is $424,000. SDOE Opportunity: OPE-0021383403'
          - 'This customer has  1 ageing units ( Core_Nimble Storage ) with support expiring in 180 days where the GBU strategy is to refresh .  Total refresh potential is $44,000.  '
      - name: STID
        synonyms:
          - account
          - country_entity
          - country_entity_id
          - customer
          - sales_territory_id
          - st_code
          - st_identifier
          - territory_id
          - territory_identifier
        description: Unique identifier for the entity grouping all subsidiaries of a customer within a certain country.
        expr: STID
        data_type: VARCHAR(16777216)
        sample_values:
          - '100002'
          - '100531'
          - '100642'
