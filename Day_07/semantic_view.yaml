  - name: '"For account 122783016, how many installed assets are eligible for refresh, how many contracts are up for renewal, and how many assets are reaching end of support within the next 180 days?"'
    sql: |-
      WITH account_ib AS (
        SELECT
          ib.*
        FROM
          ai_ib_details AS ib
          INNER JOIN ai_account_summary_s0_user_st_assignment_dtl AS a ON a.emdm_party_id_c = ib.customerid
        WHERE
          a.display_account_country_st_id = '122783016'
      )
      SELECT
        COUNT(
          CASE
            WHEN eosl <= DATEADD(DAY, 180, CURRENT_DATE)
            AND eosl >= CURRENT_DATE
            AND refresh_renew_guidance = 'Refresh' THEN 1
          END
        ) AS assets_eligible_for_refresh_180d,
        COUNT(
          CASE
            WHEN contract_end_date <= DATEADD(DAY, 180, CURRENT_DATE)
            AND contract_end_date >= CURRENT_DATE THEN 1
          END
        ) AS contracts_up_for_renewal_180d,
        COUNT(
          CASE
            WHEN supportenddate <= DATEADD(DAY, 180, CURRENT_DATE)
            AND supportenddate >= CURRENT_DATE THEN 1
          END
        ) AS assets_end_of_support_180d,
        MIN(eosl) AS min_eosl,
        MAX(eosl) AS max_eosl,
        COUNT(eosl) AS count_eosl,
        MIN(contract_end_date) AS min_contract_end_date,
        MAX(contract_end_date) AS max_contract_end_date,
        COUNT(contract_end_date) AS count_contract_end_date,
        MIN(supportenddate) AS min_supportenddate,
        MAX(supportenddate) AS max_supportenddate,
        COUNT(supportenddate) AS count_supportenddate,
        COUNT(DISTINCT refresh_renew_guidance) AS distinct_refresh_renew_guidance_values,
        COUNT(DISTINCT supportstatus) AS distinct_supportstatus_values
      FROM
        account_ib
