          - display_country_sales_territory_id
          - displayed_account_country_sfdc_id
          - sfdc_country_territory_identifier
          - sfdc_sales_territory_id
          - sfdc_st_id_for_display_country
        description: |-
          Represents the low-level (child) sales territory id derived from the assigned hierarchy. This is used for reporting and dashboard visibility to ensure data is shown at the granular and relevant level for sales users.
           
        expr: DISPLAY_ACCOUNT_COUNTRY_SFDC_ST_ID
        data_type: VARCHAR(18)
        sample_values:
          - a12Kh000003gXSVIA2
          - a12Kh000002kQ2DIAU
          - a12Kh000003gi3EIAQ
      - name: DISPLAY_ACCOUNT_COUNTRY_ST_ID
