  - name: '"For Melissa Montes''s accounts, which service opportunities have contracts expiring within the next 180 days, and what is the total annual net value and renewal status for each?"'
    sql: |-
      WITH filtered_accounts AS (
        SELECT
          st.account_name,
          ib.customerid,
          ib.service_sap_opportunity_id,
          ib.contract_end_date,
          ib.renewal_status_of_contract,
          ib.eanvglobal,
          ib.contractid
        FROM
          ai_ib_details AS ib
          LEFT OUTER JOIN ai_account_summary_s0_user_st_assignment_dtl AS st ON ib.customerid = st.emdm_party_id_c
        WHERE
          NOT ib.service_sap_opportunity_id IS NULL
          AND ib.contract_end_date <= DATEADD(DAY, 180, CURRENT_DATE)
          AND ib.contract_end_date >= CURRENT_DATE
          AND st.useremail_c = 'melissa.montes@hpe.com'
      )
      SELECT
        account_name,
        customerid,
        service_sap_opportunity_id,
        MIN(contract_end_date) AS forecasted_close_date,
        renewal_status_of_contract,
        SUM(eanvglobal) AS total_eanv_global,
        COUNT(DISTINCT contractid) AS distinct_contract_count,
        MIN(contract_end_date) AS min_contract_end_date,
        MAX(contract_end_date) AS max_contract_end_date,
        COUNT(contract_end_date) AS count_contract_end_date
      FROM
        filtered_accounts
      GROUP BY
        account_name,
        customerid,
        service_sap_opportunity_id,
        renewal_status_of_contract
      ORDER BY
        forecasted_close_date ASC
      LIMIT
        50
