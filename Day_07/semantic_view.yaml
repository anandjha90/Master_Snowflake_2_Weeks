        sample_values:
          - 701Kh000000Kk0VIAS
          - 701Kh000000zO6OIAU
          - 701Kh000000zO5pIAE
      - name: IB_ANALYTICS_PROGRAM_SUMMARY_SHORT
        description: Brief textual summaries describing the goals and focus areas of installed base analytics sales programs.
        expr: IB_ANALYTICS_PROGRAM_SUMMARY_SHORT
        data_type: VARCHAR(4000)
        sample_values:
          - The program promotes the CX10K switch to customers using VMware NSX and vSphere, highlighting cost savings, improved performance, and security. Sales teams are encouraged to engage target accounts, positioning CX10K as a cost-effective alternative. The goal is to create opportunities with a minimum value of $5,000 and a close date after November 1, 2025. The expected outcome is increased market share and reduced VMware license costs for customers.
          - This program targets customers with aging SAN infrastructure or limited disaster recovery capabilities. It encourages sales teams to review existing storage setups, collaborate with account teams, and recommend modernization solutions like transitioning to HPE GreenLake. The key sales action is creating opportunities for storage modernization projects with specific criteria. The goal is to drive customer upgrades, improve storage resilience, and increase business revenue through modernization.
          - The program promotes HPE Lifecycle Services as a value-added solution for Tech Care customers, targeting those with high-value contracts who haven't yet purchased these services. Sales teams identify eligible customers nearing contract expiration and engage them to offer tailored Lifecycle Service proposals. The key action is creating opportunities before contract renewal dates to boost service adoption. The expected outcome is increased service revenue, enhanced customer value, and stronger client relationships.
    primary_key:
      columns:
        - CAMPAIGN_ID
