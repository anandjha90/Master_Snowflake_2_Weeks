  - name: '"Which contracts for FedEx in territory 121323476 are expiring within the next 180 days, and what are their end dates?"'
    sql: |-
      SELECT
        DISTINCT ib.contractid,
        ib.contract_end_date,
        MIN(ib.contract_end_date) OVER () AS min_contract_end_date,
        MAX(ib.contract_end_date) OVER () AS max_contract_end_date,
        COUNT(ib.contract_end_date) OVER () AS count_contract_end_date,
        COUNT(DISTINCT ib.contractid) OVER () AS count_distinct_contracts
      FROM
        ai_ib_details AS ib
        LEFT OUTER JOIN ai_account_summary_s0_user_st_assignment_dtl AS ust ON ib.customerid = ust.emdm_party_id_c
      WHERE
        LOWER(ust.account_name) LIKE '%fedex%'
        AND ib.contract_end_date <= DATEADD(DAY, 180, CURRENT_DATE)
        AND ib.contract_end_date >= CURRENT_DATE
        AND ust.display_account_country_st_id = '121323476'
      ORDER BY
        ib.contract_end_date ASC
