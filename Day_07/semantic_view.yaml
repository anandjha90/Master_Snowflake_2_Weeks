  - name: '"Get top 10 workloads by Workload Priority descending from S13_MKT_WORKLOAD_ST_CE_COMBINED for DISPLAY_ACCOUNT_COUNTRY_ST_ID = ''121158387'', show Market Update Date, Workload, Workload Priority"'
    sql: |-
      SELECT
        w.mkt_update_date,
        w.sls_tty_id,
        CASE
          WHEN NOT w.ai_ml_ops_analytics IS NULL
          AND w.ai_ml_ops_analytics <> 'Null' THEN 'ai_ml_ops_analytics'
          WHEN NOT w.aruba_networking IS NULL
          AND w.aruba_networking <> 'Null' THEN 'aruba_networking'
          WHEN NOT w.baremetal IS NULL
          AND w.baremetal <> 'Null' THEN 'baremetal'
          WHEN NOT w.big_data IS NULL
          AND w.big_data <> 'Null' THEN 'big_data'
          WHEN NOT w.business_applications IS NULL
          AND w.business_applications <> 'Null' THEN 'business_applications'
          WHEN NOT w.business_continuity IS NULL
          AND w.business_continuity <> 'Null' THEN 'business_continuity'
          WHEN NOT w.compute IS NULL
          AND w.compute <> 'Null' THEN 'compute'
          WHEN NOT w.computer_vision IS NULL
          AND w.computer_vision <> 'Null' THEN 'computer_vision'
          WHEN NOT w.compute_automation IS NULL
          AND w.compute_automation <> 'Null' THEN 'compute_automation'
          WHEN NOT w.compute_virtualization IS NULL
          AND w.compute_virtualization <> 'Null' THEN 'compute_virtualization'
          WHEN NOT w.data_center_operations IS NULL
          AND w.data_center_operations <> 'Null' THEN 'data_center_operations'
          WHEN NOT w.data_protection IS NULL
          AND w.data_protection <> 'Null' THEN 'data_protection'
          WHEN NOT w.data_warehouse IS NULL
          AND w.data_warehouse <> 'Null' THEN 'data_warehouse'
          WHEN NOT w.dc_modernization IS NULL
          AND w.dc_modernization <> 'Null' THEN 'dc_modernization'
          WHEN NOT w.devops_app_modernization IS NULL
          AND w.devops_app_modernization <> 'Null' THEN 'devops_app_modernization'
          WHEN NOT w.edge_computing_iot IS NULL
          AND w.edge_computing_iot <> 'Null' THEN 'edge_computing_iot'
          WHEN NOT w.edge_to_cloud_networking IS NULL
          AND w.edge_to_cloud_networking <> 'Null' THEN 'edge_to_cloud_networking'
          WHEN NOT w.high_performance_computing IS NULL
          AND w.high_performance_computing <> 'Null' THEN 'high_performance_computing'
          WHEN NOT w.hybrid_cloud_multi_cloud IS NULL
          AND w.hybrid_cloud_multi_cloud <> 'Null' THEN 'hybrid_cloud_multi_cloud'
          WHEN NOT w.storage_modernization IS NULL
          AND w.storage_modernization <> 'Null' THEN 'storage_modernization'
          ELSE 'other'
        END AS workload,
        CASE
          WHEN w.ai_ml_ops_analytics = 'High'
          OR w.aruba_networking = 'High'
          OR w.baremetal = 'High'
          OR w.big_data = 'High'
          OR w.business_applications = 'High'
          OR w.business_continuity = 'High'
          OR w.compute = 'High'
          OR w.computer_vision = 'High'
          OR w.compute_automation = 'High'
          OR w.compute_virtualization = 'High'
