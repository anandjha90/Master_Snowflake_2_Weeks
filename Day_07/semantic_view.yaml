  - name: AI_ACCOUNT_SUMMARY_S9_MKT_COMPETITIVE_ST_CE_COMBINED
    description: The table contains records summarizing account-level sales and market activity, combining data across sales territories. Each record captures details about competitors, products, and product categories, scoped to specific sales territories and site counts.
    base_table:
      database: GL_SLS_PROD_ENR_DB
      schema: AI_FEATURE_DATASET
      table: AI_ACCOUNT_SUMMARY_S9_MKT_COMPETITIVE_ST_CE_COMBINED
    dimensions:
      - name: CATEGORY
        description: The product or solution category associated with an account.
        expr: CATEGORY
        data_type: VARCHAR(32000)
        sample_values:
          - SASE & SECURITY
          - CLOUD & AI SOLUTIONS OTHER
          - CLOUD
      - name: COMPETITOR
        description: The name of a competing company or technology.
