        COUNT(
          DISTINCT CASE
            WHEN ib.refresh_renew_guidance = 'Refresh'
            AND ib.supportenddate <= DATEADD(DAY, 180, CURRENT_DATE)
            AND ib.supportenddate >= CURRENT_DATE THEN ib.serialnumber
          END
