  - name: '"""""""""""""""""""""""""""""""""""""""""""""""""""""""""""""""For accounts with ship-to city Seattle assigned to user nilesh-vijay.khoriya@hpe.com, get total asset count grouped by DISPLAY_ACCOUNT_COUNTRY_ST_ID, DISPLAY_ACCOUNT_COUNTRY_ST_NAME, and BUSINESSUNIT, with percentage of tota"'
    sql: |-
      WITH user_accounts AS (
        SELECT
          s0.display_account_country_st_id,
          s0.display_account_country_st_name,
          s0.emdm_party_id_c
        FROM
          ai_account_summary_s0_user_st_assignment_dtl AS s0
        WHERE
          s0.useremail_c = 'nilesh-vijay.khoriya@hpe.com'
          AND s0.display_account_country_st_id IN ('121323530', '121354175', '122642544')
      ),
      seattle_ib AS (
        SELECT
          ib.customerid,
          ib.ship_to_customer_city_ibsv,
          ib.serialnumber,
          ib.businessunit,
          ib.productcategory
        FROM
          ai_ib_details AS ib
        WHERE
          UPPER(ib.ship_to_customer_city_ibsv) = 'SEATTLE'
          AND ib.finalshipdate <= CURRENT_TIMESTAMP()
      ),
      joined AS (
        SELECT
          ua.display_account_country_st_id,
          ua.display_account_country_st_name,
          si.businessunit,
          COUNT(si.serialnumber) AS total_asset_count,
          COUNT(DISTINCT si.customerid) AS distinct_customer_count,
          COUNT(DISTINCT si.productcategory) AS distinct_product_categories
        FROM
          seattle_ib AS si
          LEFT OUTER JOIN user_accounts AS ua ON si.customerid = ua.emdm_party_id_c
        WHERE
          NOT ua.display_account_country_st_id IS NULL
        GROUP BY
          ua.display_account_country_st_id,
          ua.display_account_country_st_name,
          si.businessunit
      ),
      grand_total AS (
        SELECT
          SUM(total_asset_count) AS grand_total_assets
        FROM
          joined
      )
      SELECT
        j.display_account_country_st_id,
        j.display_account_country_st_name,
        j.businessunit,
        j.total_asset_count,
        j.distinct_customer_count,
        j.distinct_product_categories,
        ROUND(
          j.total_asset_count / NULLIF(NULLIF(gt.grand_total_assets, 0), 0),
          4
        ) AS pct_of_total
      FROM
        joined AS j
        CROSS JOIN grand_total AS gt
      ORDER BY
        j.total_asset_count DESC NULLS LAST
        /* Generated by Cortex Analyst (request_id: 7f37dee7-1546-4d3f-aef5-8bb468f22dd2) */
    question: For accounts with ship-to city Seattle assigned to user nilesh-vijay.khoriya@hpe.com, get total asset count grouped by DISPLAY_ACCOUNT_COUNTRY_ST_ID, DISPLAY_ACCOUNT_COUNTRY_ST_NAME, and BUSINESSUNIT, with percentage of total, for accounts 121323530, 121354175, 122642544
